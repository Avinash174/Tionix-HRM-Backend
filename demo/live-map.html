<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRM Admin — Live Employee Map</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #0f172a; }
    .layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
    .sidebar { background: #fff; border-right: 1px solid #e2e8f0; overflow-y: auto; padding: 16px; }
    .sidebar h1 { font-size: 18px; margin: 0 0 4px; }
    .sidebar p { font-size: 12px; color: #64748b; margin: 0 0 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 4px; }
    input, select, button {
      width: 100%; padding: 8px 10px; margin-bottom: 10px;
      border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px;
    }
    button { background: #2563eb; color: #fff; border: none; cursor: pointer; font-weight: 600; }
    button:hover { background: #1d4ed8; }
    button.secondary { background: #e2e8f0; color: #0f172a; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
    .stat { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; }
    .stat strong { display: block; font-size: 20px; }
    .stat span { font-size: 11px; color: #64748b; }
    .hint { font-size: 12px; color: #b45309; background: #fffbeb; border: 1px solid #fde68a; padding: 8px; border-radius: 8px; margin-bottom: 10px; }
    .status-line { font-size: 12px; color: #64748b; margin-bottom: 10px; }
    .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-right: 6px; animation: pulse 1.2s infinite; vertical-align: middle; }
    .live-dot.off { background: #94a3b8; animation: none; }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.3); } }
    .employee-list { margin-top: 8px; }
    .employee-item {
      border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin-bottom: 8px;
      cursor: pointer; background: #fff;
    }
    .employee-item:hover { border-color: #93c5fd; background: #eff6ff; }
    .employee-item .name { font-weight: 600; font-size: 14px; }
    .employee-item .meta { font-size: 12px; color: #64748b; margin-top: 4px; }
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 999px; margin-right: 4px; }
    .badge.online { background: #dcfce7; color: #166534; }
    .badge.offline { background: #f1f5f9; color: #475569; }
    .badge.inside { background: #dbeafe; color: #1e40af; }
    .badge.outside { background: #fee2e2; color: #991b1b; }
    #map { width: 100%; height: 100vh; }
    .login-panel { max-width: 360px; margin: 80px auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,.08); }
    .hidden { display: none !important; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .sidebar { max-height: 45vh; }
      #map { height: 55vh; }
    }
  </style>
</head>
<body>
  <div id="login-screen" class="login-panel">
    <h1>Admin Login</h1>
    <p>Login karke live employee map dekho</p>
    <label>Username</label>
    <input id="username" value="ADMIN" />
    <label>Password</label>
    <input id="password" type="password" />
    <button onclick="login()">Login & Open Map</button>
    <p id="login-error" style="color:#dc2626;font-size:13px;"></p>
  </div>

  <div id="app" class="layout hidden">
    <aside class="sidebar">
      <h1>Live Employee Map</h1>
      <p>Real-time tracking (Zomato/Rapido style) — live GPS + trail on map</p>

      <label>Office</label>
      <select id="officeSelect" onchange="onOfficeChange()">
        <option value="">All offices (default)</option>
      </select>

      <div class="stats">
        <div class="stat"><strong id="stat-total">0</strong><span>Total</span></div>
        <div class="stat"><strong id="stat-online">0</strong><span>Online</span></div>
        <div class="stat"><strong id="stat-inside">0</strong><span>Inside</span></div>
        <div class="stat"><strong id="stat-outside">0</strong><span>Outside</span></div>
      </div>

      <div id="hint" class="hint hidden"></div>
      <div id="status" class="status-line"><span id="live-dot" class="live-dot off"></span>Loading...</div>

      <button onclick="refreshMap()">Refresh Now</button>
      <button class="secondary" onclick="logout()">Logout</button>

      <div class="employee-list" id="employee-list"></div>
    </aside>
    <div id="map"></div>
  </div>

  <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
  <script src="/admin-map/config.js"></script>
  <script>
    const API_BASE = window.ADMIN_MAP_CONFIG?.apiBase || window.location.origin;
    const GOOGLE_MAPS_KEY = window.ADMIN_MAP_CONFIG?.googleMapsKey || '';
    const TRAIL_MAX = 40;
    const ANIM_MS = 1400;

    let map, officeCircle, officeMarker, adminToken = localStorage.getItem('adminToken') || '';
    let markers = {};
    let employeesCache = new Map();
    let refreshTimer = null;
    let socket = null;
    let socketOfficeId = null;
    let didFitBounds = false;

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function matchesOffice(emp) {
      const locationId = document.getElementById('officeSelect')?.value || '';
      if (!locationId) return true;
      return String(emp.locationId || '') === String(locationId);
    }

    function markerColor(emp) {
      if (emp.status === 'online' && emp.geofenceStatus === 'inside') return '#22c55e';
      if (emp.status === 'online') return '#eab308';
      return '#ef4444';
    }

    function buildMarkerIcon(emp) {
      const color = markerColor(emp);
      const heading = Number(emp.heading);
      const hasHeading = Number.isFinite(heading);

      return {
        path: hasHeading ? google.maps.SymbolPath.FORWARD_CLOSED_ARROW : google.maps.SymbolPath.CIRCLE,
        scale: hasHeading ? 5 : 9,
        fillColor: color,
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2,
        rotation: hasHeading ? heading : 0,
      };
    }

    function infoHtml(emp) {
      return `
        <div style="min-width:180px;font-family:system-ui,sans-serif">
          <strong>${emp.empName || emp.empCode}</strong><br/>
          Code: ${emp.empCode}<br/>
          Status: ${emp.status || 'online'}<br/>
          Office: ${emp.geofenceStatus || 'unknown'}<br/>
          Distance: ${emp.distanceFromOfficeMeters ?? '-'} m<br/>
          Speed: ${emp.speed != null ? Number(emp.speed).toFixed(1) + ' m/s' : '-'}<br/>
          Last seen: ${emp.lastSeenLabel || 'just now'}
        </div>
      `;
    }

    function animateMarkerTo(key, target, onDone) {
      const entry = markers[key];
      if (!entry?.marker) return onDone?.();

      const from = entry.marker.getPosition();
      if (!from) {
        entry.marker.setPosition(target);
        return onDone?.();
      }

      const startLat = from.lat();
      const startLng = from.lng();
      const endLat = target.lat;
      const endLng = target.lng;

      if (Math.abs(startLat - endLat) < 0.000001 && Math.abs(startLng - endLng) < 0.000001) {
        return onDone?.();
      }

      if (entry.animFrame) cancelAnimationFrame(entry.animFrame);
      const startTime = performance.now();

      function step(now) {
        const t = Math.min(1, (now - startTime) / ANIM_MS);
        const e = easeInOut(t);
        entry.marker.setPosition({
          lat: startLat + (endLat - startLat) * e,
          lng: startLng + (endLng - startLng) * e,
        });
        if (t < 1) {
          entry.animFrame = requestAnimationFrame(step);
        } else {
          entry.animFrame = null;
          onDone?.();
        }
      }
      entry.animFrame = requestAnimationFrame(step);
    }

    function appendTrailPoint(key, latLng) {
      const entry = markers[key];
      if (!entry) return;

      const last = entry.trailPoints[entry.trailPoints.length - 1];
      if (last && Math.abs(last.lat - latLng.lat) < 0.000001 && Math.abs(last.lng - latLng.lng) < 0.000001) {
        return;
      }

      entry.trailPoints.push(latLng);
      if (entry.trailPoints.length > TRAIL_MAX) entry.trailPoints.shift();

      if (entry.trail) {
        entry.trail.setPath(entry.trailPoints);
      } else {
        entry.trail = new google.maps.Polyline({
          map,
          path: entry.trailPoints,
          strokeColor: '#2563eb',
          strokeOpacity: 0.75,
          strokeWeight: 4,
          geodesic: true,
          icons: [{
            icon: { path: google.maps.SymbolPath.CIRCLE, scale: 3, fillColor: '#2563eb', fillOpacity: 0.5, strokeWeight: 0 },
            offset: '100%',
          }],
        });
      }
    }

    function upsertEmployee(emp, animate) {
      if (emp.latitude == null || emp.longitude == null) return;
      if (!matchesOffice(emp)) return;

      const key = String(emp.empCode);
      employeesCache.set(key, { ...employeesCache.get(key), ...emp });
      const position = { lat: Number(emp.latitude), lng: Number(emp.longitude) };

      if (markers[key]) {
        markers[key].marker.setIcon(buildMarkerIcon(emp));
        if (animate) {
          animateMarkerTo(key, position, () => appendTrailPoint(key, position));
        } else {
          markers[key].marker.setPosition(position);
          appendTrailPoint(key, position);
        }
      } else {
        const marker = new google.maps.Marker({
          position,
          map,
          title: `${emp.empName} (${emp.empCode})`,
          icon: buildMarkerIcon(emp),
          zIndex: 100,
        });

        const infoWindow = new google.maps.InfoWindow();
        marker.addListener('click', () => {
          const latest = employeesCache.get(key) || emp;
          infoWindow.setContent(infoHtml(latest));
          infoWindow.open(map, marker);
        });

        markers[key] = {
          marker,
          trail: null,
          trailPoints: [position],
          infoWindow,
          animFrame: null,
        };
        appendTrailPoint(key, position);
      }
    }

    function removeStaleMarkers(activeKeys) {
      Object.keys(markers).forEach((key) => {
        if (!activeKeys.has(key)) {
          if (markers[key].animFrame) cancelAnimationFrame(markers[key].animFrame);
          if (markers[key].trail) markers[key].trail.setMap(null);
          markers[key].marker.setMap(null);
          delete markers[key];
          employeesCache.delete(key);
        }
      });
    }

    function recomputeStats() {
      const employees = [...employeesCache.values()];
      const summary = {
        total: employees.length,
        online: employees.filter((e) => e.status === 'online').length,
        inside: employees.filter((e) => e.geofenceStatus === 'inside').length,
        outside: employees.filter((e) => e.geofenceStatus === 'outside').length,
      };
      updateStats(summary, employees.length);
      updateEmployeeList(employees);
    }

    function handleLivePoint(point, animate) {
      if (!point?.empCode) return;
      upsertEmployee({
        ...point,
        status: point.status || 'online',
        lastSeenLabel: point.lastSeenLabel || 'just now',
      }, animate);
      recomputeStats();
      document.getElementById('status').innerHTML =
        `<span id="live-dot" class="live-dot"></span>Live • ${employeesCache.size} on map • ${new Date().toLocaleTimeString()}`;
    }

    function connectSocket() {
      if (socket) {
        socket.disconnect();
        socket = null;
      }

      socket = io(API_BASE, { transports: ['websocket', 'polling'] });
      socket.on('connect', () => {
        document.getElementById('live-dot')?.classList.remove('off');
        socket.emit('join-admin');
        joinOfficeRoom();
      });
      socket.on('disconnect', () => {
        document.getElementById('live-dot')?.classList.add('off');
      });

      socket.on('employee-live-location', (point) => handleLivePoint(point, true));
      socket.on('employee-location-update', (point) => handleLivePoint(point, true));
    }

    function joinOfficeRoom() {
      if (!socket) return;
      const locationId = document.getElementById('officeSelect')?.value || '';
      if (socketOfficeId) socket.emit('leave-admin-office', socketOfficeId);
      socketOfficeId = locationId || null;
      if (locationId) socket.emit('join-admin-office', locationId);
    }

    function clearMapLayers() {
      Object.keys(markers).forEach((key) => {
        if (markers[key].animFrame) cancelAnimationFrame(markers[key].animFrame);
        if (markers[key].trail) markers[key].trail.setMap(null);
        markers[key].marker.setMap(null);
      });
      markers = {};
      employeesCache.clear();
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';

      try {
        const res = await fetch(`${API_BASE}/api/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok || !data.token) throw new Error(data.message || 'Login failed');

        adminToken = data.token;
        localStorage.setItem('adminToken', adminToken);
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        await loadOffices();
        connectSocket();
        loadGoogleMaps();
      } catch (err) {
        errEl.textContent = err.message;
      }
    }

    function logout() {
      adminToken = '';
      localStorage.removeItem('adminToken');
      if (socket) socket.disconnect();
      location.reload();
    }

    async function loadOffices() {
      const res = await fetch(`${API_BASE}/api/admin/offices`, {
        headers: { Authorization: `Bearer ${adminToken}` },
      });
      const data = await res.json();
      const select = document.getElementById('officeSelect');
      select.innerHTML = '';
      (data.offices || []).forEach((office) => {
        const opt = document.createElement('option');
        opt.value = office.officeId || office.LocationID;
        opt.textContent = office.name || office.officeName || office.LocationName;
        select.appendChild(opt);
      });

      const saved = localStorage.getItem('selectedOfficeId');
      if (saved && [...select.options].some((opt) => opt.value === saved)) {
        select.value = saved;
      } else if (select.options.length) {
        select.value = select.options[0].value;
        localStorage.setItem('selectedOfficeId', select.value);
      }
    }

    function onOfficeChange() {
      const id = document.getElementById('officeSelect').value;
      localStorage.setItem('selectedOfficeId', id);
      didFitBounds = false;
      clearMapLayers();
      joinOfficeRoom();
      refreshMap();
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 20.5937, lng: 78.9629 },
        zoom: 5,
        mapTypeControl: false,
        streetViewControl: false,
      });

      refreshMap();
      refreshTimer = setInterval(refreshMap, 60000);
    }

    async function refreshMap() {
      const statusEl = document.getElementById('status');
      const hintEl = document.getElementById('hint');
      const locationId = document.getElementById('officeSelect')?.value || '';

      if (!adminToken) return;

      let url = `${API_BASE}/api/admin/tracking/live`;
      if (locationId) url += `?locationId=${locationId}`;

      try {
        const res = await fetch(url, { headers: { Authorization: `Bearer ${adminToken}` } });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Failed to load live data');

        const employees = (data.employees || []).filter((e) => e.latitude != null && e.longitude != null);
        const activeKeys = new Set();

        employees.forEach((emp) => {
          activeKeys.add(String(emp.empCode));
          upsertEmployee(emp, false);
        });
        removeStaleMarkers(activeKeys);
        recomputeStats();

        updateOfficeCircle(data.office);

        if (data.hint) {
          hintEl.textContent = data.hint;
          hintEl.classList.remove('hidden');
        } else {
          hintEl.classList.add('hidden');
        }

        const liveClass = socket?.connected ? 'live-dot' : 'live-dot off';
        statusEl.innerHTML = `<span id="live-dot" class="${liveClass}"></span>Synced ${employees.length} employees • ${new Date().toLocaleTimeString()}`;

        if (!didFitBounds) {
          fitMapBounds(data.office, employees);
          didFitBounds = true;
        }
      } catch (err) {
        console.error(err);
        statusEl.textContent = `Error: ${err.message}`;
      }
    }

    function updateStats(summary, count) {
      document.getElementById('stat-total').textContent = summary?.total ?? count;
      document.getElementById('stat-online').textContent = summary?.online ?? 0;
      document.getElementById('stat-inside').textContent = summary?.inside ?? 0;
      document.getElementById('stat-outside').textContent = summary?.outside ?? 0;
    }

    function updateOfficeCircle(office) {
      if (!office?.latitude || !office?.longitude) return;

      const center = { lat: Number(office.latitude), lng: Number(office.longitude) };
      const radius = Number(office.radiusMeters || 25);

      if (officeCircle) officeCircle.setMap(null);
      if (officeMarker) officeMarker.setMap(null);

      officeCircle = new google.maps.Circle({
        map,
        center,
        radius,
        fillColor: '#2563eb',
        fillOpacity: 0.12,
        strokeColor: '#2563eb',
        strokeOpacity: 0.8,
        strokeWeight: 2,
      });

      officeMarker = new google.maps.Marker({
        map,
        position: center,
        title: office.name || 'Office',
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8,
          fillColor: '#2563eb',
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 2,
        },
        zIndex: 50,
      });
    }

    function updateEmployeeList(employees) {
      const container = document.getElementById('employee-list');
      if (!employees.length) {
        container.innerHTML = '<small>No employees with location today. Assign office + punch in or send live GPS.</small>';
        return;
      }

      container.innerHTML = employees.map((emp) => `
        <div class="employee-item" data-code="${emp.empCode}">
          <div class="name">${emp.empName || emp.empCode}</div>
          <div class="meta">
            <span class="badge ${emp.status}">${emp.status}</span>
            <span class="badge ${emp.geofenceStatus}">${emp.geofenceStatus || 'unknown'}</span>
            ${emp.empCode} • ${emp.lastSeenLabel || 'now'}
          </div>
        </div>
      `).join('');

      container.querySelectorAll('.employee-item').forEach((el) => {
        el.onclick = () => {
          const code = el.dataset.code;
          if (markers[code]) {
            map.panTo(markers[code].marker.getPosition());
            map.setZoom(16);
            google.maps.event.trigger(markers[code].marker, 'click');
          }
        };
      });
    }

    function fitMapBounds(office, employees) {
      const bounds = new google.maps.LatLngBounds();
      let hasPoint = false;

      if (office?.latitude && office?.longitude) {
        bounds.extend({ lat: Number(office.latitude), lng: Number(office.longitude) });
        hasPoint = true;
      }

      employees.forEach((emp) => {
        bounds.extend({ lat: Number(emp.latitude), lng: Number(emp.longitude) });
        hasPoint = true;
      });

      if (hasPoint) map.fitBounds(bounds, 60);
    }

    function loadGoogleMaps() {
      if (!GOOGLE_MAPS_KEY) {
        document.getElementById('status').textContent =
          'Add GOOGLE_MAPS_API_KEY in .env and restart server';
        return;
      }

      window.initMap = initMap;
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_KEY}&callback=initMap`;
      script.async = true;
      document.head.appendChild(script);
    }

    if (adminToken) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      loadOffices().then(() => {
        connectSocket();
        loadGoogleMaps();
      });
    }
  </script>
</body>
</html>
